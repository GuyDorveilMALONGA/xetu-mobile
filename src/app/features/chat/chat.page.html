<ion-content [fullscreen]="true" [scrollY]="false" class="chat-content">
  <div class="chat-screen">

    <div class="chat-header">
      <div class="chat-avatar" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 8V4H8"/>
          <rect width="16" height="12" x="4" y="8" rx="2"/>
          <path d="M2 14h2"/>
          <path d="M20 14h2"/>
          <path d="M15 13v2"/>
          <path d="M9 13v2"/>
        </svg>
        <span class="chat-status-dot"></span>
      </div>
      <div class="chat-header-info">
        <div class="chat-header-name">Xëtu IA</div>
        <div class="chat-header-status">{{ statusLabel() }}</div>
      </div>
    </div>

    <div class="chat-messages-wrap" #messagesWrap>
      <div class="chat-msg chat-msg--bot">
        <div class="chat-bubble">Salam !<br>Je suis Xëtu, ton assistant bus à Dakar.<br>Pose-moi une question sur les lignes, les arrêts ou ton itinéraire.</div>
        <div class="chat-msg-time">maintenant</div>
      </div>

      @for (msg of messages(); track msg.time + msg.text) {
        <div class="chat-msg" [class.chat-msg--user]="msg.role === 'user'" [class.chat-msg--bot]="msg.role === 'bot'">
          <div class="chat-bubble" [innerHTML]="msg.text | formatMessage"></div>
          <div class="chat-msg-time">{{ msg.time }}</div>
        </div>
      }

      @if (chatTyping()) {
        <div class="chat-msg chat-msg--bot">
          <div class="chat-bubble chat-typing">
            <span class="chat-typing-dot"></span><span class="chat-typing-dot"></span><span class="chat-typing-dot"></span>
          </div>
        </div>
      }

      @if (chatStatus()) {
        <div class="chat-status-pill">{{ chatStatus() }}</div>
      }
    </div>

    <div class="chat-composer">
      <div class="chat-composer-field">
        <textarea
          #composerInput
          class="chat-composer-input"
          placeholder="Pose ta question…"
          rows="1"
          maxlength="500"
          [value]="composerText"
          (input)="onComposerInput($event)"
          (keydown)="onEnterPress($event)"></textarea>
        <button
          type="button"
          class="chat-composer-send"
          [disabled]="!composerText.trim()"
          aria-label="Envoyer"
          (click)="sendCurrentMessage()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>
</ion-content>
