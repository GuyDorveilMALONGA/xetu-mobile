<div class="subscribe-modal-inner">
  <div class="subscribe-modal-title">S'abonner à une ligne</div>
  <div class="subscribe-search-wrap">
    <input
      type="text"
      class="subscribe-search"
      placeholder="Chercher une ligne…"
      [(ngModel)]="searchQuery"
      (ngModelChange)="filterLines()" />
  </div>
  <div class="subscribe-lines">
    @for (line of filteredLines; track line.number) {
      <button
        type="button"
        class="subscribe-chip"
        [class.subscribed]="line.isSubscribed"
        [attr.aria-label]="(line.isSubscribed ? 'Se désabonner de la ligne ' : 'S\'abonner à la ligne ') + line.number"
        (click)="toggleSubscription(line)">
        {{ line.number }}
      </button>
    } @empty {
      <div class="subscribe-empty">Aucune ligne ne correspond à votre recherche.</div>
    }
  </div>
  <button type="button" class="subscribe-cancel-btn" (click)="dismiss()">Annuler</button>
</div>
